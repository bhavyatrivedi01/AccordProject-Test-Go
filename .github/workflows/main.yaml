name: Model Verification Pipeline
on: [push, pull_request]

jobs:
  verify-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Tooling Image
        run: docker build -t concerto-tool -f docker/Dockerfile .

      - name: Generate and Organize Code
        run: |
          for f in models/*.cto; do
            filename=$(basename "$f" .cto)
            temp_out="temp_$filename"
            final_out="dist/$filename"
            mkdir -p "$temp_out"
            
            # Generate code
            docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace concerto-tool \
              compile --model "$f" --target golang --output "$temp_out"
            
            # Move files into package-specific subdirectories
            find "$temp_out" -name "*.go" | while read -r gofile; do
              pkg_name=$(grep -m 1 "^package " "$gofile" | awk '{print $2}')
              mkdir -p "$final_out/$pkg_name"
              mv "$gofile" "$final_out/$pkg_name/"
            done
          done

      - name: Run Generic Tests
        run: |
          for dir in dist/*; do
            model_name=$(basename "$dir")
            echo "Processing module: $model_name"

            # 1. Initialize the root module for this CTO file
            docker run --rm -v ${{ github.workspace }}:/workspace -w "/workspace/$dir" \
              --entrypoint /bin/sh concerto-tool -c "go mod init test/models/$model_name"

            # 2. Fix 'not in std' by mapping packages to local folders
            for subdir in $dir/*/; do
              pkg=$(basename "$subdir")
              # Map the package name to its relative local path
              docker run --rm -v ${{ github.workspace }}:/workspace -w "/workspace/$dir" \
                --entrypoint /bin/sh concerto-tool -c "go mod edit -replace $pkg=./$pkg"
              
              # 3. Inject the test file ONLY where the Shipment struct exists
              # We search for the struct definition in the file
              if grep -q "type Shipment struct" "$subdir"/*.go 2>/dev/null; then
                echo "Found Shipment in $pkg. Injecting test..."
                # Update package name in test file to match the directory
                sed "s/package main/package $pkg/" tests/generic_test.go > "$subdir/generic_test.go"
              fi
            done

            # 4. Final sync and test execution
            docker run --rm -v ${{ github.workspace }}:/workspace -w "/workspace/$dir" \
              --entrypoint /bin/sh concerto-tool -c "go mod tidy && go test -v ./..."
          done
