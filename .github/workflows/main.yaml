name: Model Verification Pipeline
on: [push, pull_request]

jobs:
  verify-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 1: Build your custom Tooling Image from the /docker folder
      - name: Build Tooling Image
        run: docker build -t concerto-tool -f docker/Dockerfile .

      # Step 2: Loop through models and use the Docker image to generate code
      - name: Generate and Sort Go Packages
        run: |
          for f in models/*.cto; do
            filename=$(basename "$f" .cto)
            temp_out="temp_gen_$filename"
            final_out="dist/$filename"
            mkdir -p "$temp_out"
            
            # 1. Generate everything into a temp folder
            docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace concerto-tool \
              compile --model "$f" --target golang --output "$temp_out"
            
            # 2. For each .go file, find its package name and move it to a subfolder
            find "$temp_out" -name "*.go" | while read -r gofile; do
              pkg_name=$(grep -m 1 "^package " "$gofile" | awk '{print $2}')
              mkdir -p "$final_out/$pkg_name"
              mv "$gofile" "$final_out/$pkg_name/"
            done
            
            # 3. Initialize the module in the root of the model's dist folder
            cd "$final_out"
            go mod init "test/models/$filename"
            go mod tidy
            cd ../..
          done

      # Step 3: Inject the generic test and run 'go test' inside the container
      - name: Run Generic Tests
        run: |
          for dir in dist/*; do
            # Copy the generic test from /tests into the generated output folder
            cp tests/generic_test.go "$dir/"
            
            # Run the test environment inside the container
            docker run --rm -v ${{ github.workspace }}:/workspace --workdir "/workspace/$dir" \
              --entrypoint /bin/sh concerto-tool -c "go mod init test/models && go mod tidy && go test -v ."
          done
