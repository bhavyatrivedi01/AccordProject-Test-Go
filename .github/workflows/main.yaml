name: Model Verification Pipeline
on: [push, pull_request]

jobs:
  verify-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Tooling Image
        run: docker build -t concerto-tool -f docker/Dockerfile .

      - name: Generate and Organize Code
        run: |
          for f in models/*.cto; do
            filename=$(basename "$f" .cto)
            temp_out="temp_$filename"
            final_out="dist/$filename"
            mkdir -p "$temp_out"
            
            # Generate into a temporary folder first
            docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace concerto-tool \
              compile --model "$f" --target golang --output "$temp_out"
            
            # Move files into package-specific subdirectories
            find "$temp_out" -name "*.go" | while read -r gofile; do
              pkg_name=$(grep -m 1 "^package " "$gofile" | awk '{print $2}')
              mkdir -p "$final_out/$pkg_name"
              mv "$gofile" "$final_out/$pkg_name/"
            done
          done

      - name: Run Generic Tests
        run: |
          for dir in dist/*; do
            # 1. Copy the generic test into the root of the generated model directory
            cp tests/generic_test.go "$dir/"
            
            # 2. Run the test environment inside the container
            # We use 'go test ./...' to recurse into the package subdirectories
            docker run --rm -v ${{ github.workspace }}:/workspace --workdir "/workspace/$dir" \
              --entrypoint /bin/sh concerto-tool -c "go mod init test/models && go mod tidy && go test -v ./..."
          done
