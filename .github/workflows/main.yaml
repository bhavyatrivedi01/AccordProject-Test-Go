name: Model Verification Pipeline
on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tooling
        run: docker build -t concerto-tool -f docker/Dockerfile .

      - name: Generate and Test
        run: |
          rm -rf dist/model && mkdir -p dist/model
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace concerto-tool \
            compile --model models/model.cto --target golang --output dist/model
          
          cd dist/model
          # 1. Standardize the package name
          find . -name "*.go" -exec sed -i 's/^package .*/package model/' {} +
          # 2. Clean up imports that are now local
          find . -name "*.go" -exec sed -i '/import "concerto/d' ./{} +
          find . -name "*.go" -exec sed -i '/import "org_example_shipping/d' ./{} +

          # 3. Setup test
          cp ../../tests/generic_test.go ./model_test.go
          sed -i 's/package main/package model/' model_test.go

          # 4. Run inside the 1.25 container
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace/dist/model \
            --entrypoint /bin/sh concerto-tool -c "go mod init model-test && go mod tidy && go test -v ."
