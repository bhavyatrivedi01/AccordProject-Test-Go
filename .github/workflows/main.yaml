on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Tooling
        run: docker build -t concerto-tool -f docker/Dockerfile .

      - name: Generate Model
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist/model
          mkdir -p dist/model

          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            concerto-tool \
            compile --model models/model.cto --target golang --output dist/model

      - name: Prepare Go module and inject test
        shell: bash
        run: |
          set -euo pipefail

          cd dist/model

          PKG_DIR="$(find . -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          if [ -z "${PKG_DIR}" ]; then
            echo "No generated package directory found in dist/model"
            exit 1
          fi

          cat > go.mod <<'EOF'
          module modeltest

          go 1.25.0
          EOF

          cp ../../tests/generic_test.go "${PKG_DIR}/model_test.go"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/dist/model \
            --entrypoint /bin/sh \
            concerto-tool \
            -c "go mod tidy && go test -v ./..."
